name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  BUILD_TYPE: Release

jobs:
  # iOS build and test - the main target platform
  ios-build-and-test:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
    
    - name: Install dependencies
      run: brew install cmake ninja pkg-config
    
    - name: Configure for iOS
      run: |
        cmake -B build-ios \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_IOS_FEATURES=ON \
          -G Ninja
    
    - name: Build for iOS
      run: cmake --build build-ios --parallel
    
    - name: Configure for macOS (for testing)
      run: |
        cmake -B build-macos \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_TESTING=ON \
          -DENABLE_LOGGING=ON \
          -DENABLE_SECURITY_FEATURES=ON \
          -G Ninja
    
    - name: Build for macOS
      run: cmake --build build-macos --parallel
    
    - name: Run Tests
      run: |
        cd build-macos
        ./unit_tests --gtest_output=xml:unit_tests.xml || true
        ./integration_tests --gtest_output=xml:integration_tests.xml || true
        ./ios_tests --gtest_output=xml:ios_tests.xml || true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-ios
        path: build-macos/*.xml
    
    - name: Archive iOS build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build-ios/