name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality-gate:
    name: Quality gate (build, warnings-as-errors, tests, perf baseline)
    # The package compiles against iOS 26 / macOS 26 SDK symbols (NEDNSSettings.allowFailover),
    # so the runner needs Xcode 26.x; macos-15's default Xcode 16 SDK cannot build it.
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run quality gate
        run: ./Scripts/quality-gate.sh
