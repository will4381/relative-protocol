name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'v1.0.0'

env:
  BUILD_TYPE: Release

jobs:
  # Create GitHub release
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
    
    - name: Generate changelog
      id: changelog
      run: |
        # Generate changelog from commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$LAST_TAG" ]; then
          CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" --reverse)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: RelativeProtocol VPN ${{ steps.get_version.outputs.version }}
        body: |
          ## What's Changed
          ${{ steps.changelog.outputs.changelog }}
          
          ## Test Results
          All tests pass on supported platforms (Ubuntu, macOS).
          
          ## Security
          - All security tests pass
          - Static analysis clean
          - Memory leak tests pass
          
          ## iOS Support
          - Framework builds successfully for iOS 14.0+
          - Supports both arm64 and x86_64 architectures
          
          ## Installation
          See README.md for installation instructions.
          
          🤖 Generated with [Claude Code](https://claude.ai/code)
        draft: false
        prerelease: false

  # Build release artifacts for multiple platforms
  build-release:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            cmake_args: ""
          - os: macos-latest
            name: macos-universal
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES='arm64;x86_64'"
          - os: macos-latest
            name: ios-universal
            cmake_args: "-DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES='arm64;x86_64' -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DENABLE_IOS_FEATURES=ON"
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build libssl-dev
    
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake ninja
    
    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_STATIC_LIBRARY=ON \
          -DENABLE_SHARED_LIBRARY=ON \
          -G Ninja \
          ${{ matrix.cmake_args }}
    
    - name: Build
      run: cmake --build build --config Release --parallel
    
    - name: Run tests (non-iOS only)
      if: matrix.name != 'ios-universal'
      run: |
        cd build
        ./unit_tests || true
        ./integration_tests || true
    
    - name: Package artifacts
      run: |
        mkdir -p dist/${{ matrix.name }}
        
        # Copy libraries
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          cp build/src/librelative_vpn.a dist/${{ matrix.name }}/
          cp build/src/librelative_vpn.so dist/${{ matrix.name }}/ || true
        else
          cp build/src/librelative_vpn.a dist/${{ matrix.name }}/
          cp build/src/librelative_vpn.dylib dist/${{ matrix.name }}/ || true
        fi
        
        # Copy headers
        cp -r include/ dist/${{ matrix.name }}/include/
        
        # Copy examples
        cp -r examples/ dist/${{ matrix.name }}/examples/
        
        # Copy documentation
        cp README.md dist/${{ matrix.name }}/
        cp -r docs/ dist/${{ matrix.name }}/docs/ || true
        
        # Create archive
        cd dist
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          tar -czf relativeprotocol-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz ${{ matrix.name }}/
        else
          tar -czf relativeprotocol-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz ${{ matrix.name }}/
        fi
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./dist/relativeprotocol-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
        asset_name: relativeprotocol-${{ needs.create-release.outputs.version }}-${{ matrix.name }}.tar.gz
        asset_content_type: application/gzip

  # Create iOS XCFramework
  ios-xcframework:
    needs: create-release
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
    
    - name: Install dependencies
      run: brew install cmake ninja
    
    - name: Build for iOS Device
      run: |
        cmake -B build-ios-device \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_IOS_FEATURES=ON \
          -DENABLE_STATIC_LIBRARY=ON \
          -G Ninja
        cmake --build build-ios-device --parallel
    
    - name: Build for iOS Simulator
      run: |
        cmake -B build-ios-simulator \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_SYSROOT=iphonesimulator \
          -DENABLE_IOS_FEATURES=ON \
          -DENABLE_STATIC_LIBRARY=ON \
          -G Ninja
        cmake --build build-ios-simulator --parallel
    
    - name: Create XCFramework
      run: |
        mkdir -p RelativeProtocol.xcframework
        
        xcodebuild -create-xcframework \
          -library build-ios-device/src/librelative_vpn.a \
          -headers include/ \
          -library build-ios-simulator/src/librelative_vpn.a \
          -headers include/ \
          -output RelativeProtocol.xcframework
        
        # Archive XCFramework
        tar -czf RelativeProtocol-${{ needs.create-release.outputs.version }}.xcframework.tar.gz RelativeProtocol.xcframework/
    
    - name: Upload XCFramework
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./RelativeProtocol-${{ needs.create-release.outputs.version }}.xcframework.tar.gz
        asset_name: RelativeProtocol-${{ needs.create-release.outputs.version }}.xcframework.tar.gz
        asset_content_type: application/gzip

  # Update documentation
  update-docs:
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz
    
    - name: Generate documentation
      run: |
        # Create basic Doxyfile if it doesn't exist
        if [ ! -f docs/Doxyfile ]; then
          mkdir -p docs
          doxygen -g docs/Doxyfile
          sed -i 's/PROJECT_NAME           = "My Project"/PROJECT_NAME           = "RelativeProtocol VPN"/' docs/Doxyfile
          sed -i 's/INPUT                  =/INPUT                  = src include/' docs/Doxyfile
          sed -i 's/RECURSIVE              = NO/RECURSIVE              = YES/' docs/Doxyfile
          sed -i 's/GENERATE_HTML          = YES/GENERATE_HTML          = YES/' docs/Doxyfile
          sed -i 's/HTML_OUTPUT            = html/HTML_OUTPUT            = html/' docs/Doxyfile
        fi
        
        doxygen docs/Doxyfile
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/html
        cname: docs.relativeprotocol.com  # Optional: if you have a custom domain